<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Construction</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #ffffff;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Mobile overrides */
    @media (max-width: 768px) {
      body {
        align-items: flex-start;
        overflow-y: auto;
      }
    }

    img {
      display: block;
    }

    /* Mobile: width matches browser width */
    @media (max-width: 768px) {
      img {
        width: 100vw;
        height: auto;
      }
    }

    /* Desktop/PC: height matches browser height */
    @media (min-width: 769px) {
      img {
        height: 100vh;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <img src="assets/under_construction.png" alt="Under Construction">
</body>
</html>
